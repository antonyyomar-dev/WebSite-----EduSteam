<!DOCTYPE html>
<html lang="es">

<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>EduSteam - Sesión en vivo</title>
  <link href="https://fonts.googleapis.com/css2?family=El+Messiri:wght@400;500;600;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
  <link rel="stylesheet" href="sesion.css">
</head>

<body class="sesion-page">

  <!-- NAVBAR simplificado -->
  <nav class="nav-sesion">
    <a class="logo" href="index.html">
      <img src="images/logo.png" alt="Logo EduSteam" class="logo-icon">
      <span class="logo-text">EduSteam</span>
    </a>

    <!-- Botón volver atrás -->
    <button class="btn-volver" id="btnVolver" onclick="history.back()">
      <svg width="16" height="16" viewBox="0 0 16 16" fill="none">
        <path d="M10 3L5 8l5 5" stroke="#1a2356" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
      Volver
    </button>
  </nav>

  <!-- ÁREA DE VIDEOLLAMADA -->
  <div class="video-wrapper">

    <div class="video-main" id="videoMain">

      <!-- Imagen principal: estudiante en sesión -->
      <img
        src="images/estudiante_en_sesion.png"
        alt="Juan Castillo"
        class="video-bg"
        onerror="this.style.display='none'"
      />
      <div class="video-placeholder-bg"></div>

      <!-- Miniatura PiP: profesora -->
      <div class="video-pip" id="videoPip">
        <img
          src="images/profesora.png"
          alt="Maria Perez"
          class="pip-img"
          onerror="this.style.display='none'"
        />
        <div class="pip-placeholder"></div>
        <span class="pip-name">Maria Perez</span>
      </div>

      <!-- Nombre participante principal -->
      <span class="video-name">Juan Castillo</span>

      <!-- BARRA DE CONTROLES -->
      <div class="controls-bar">

        <button class="ctrl-btn" title="Configuración">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none">
            <circle cx="12" cy="12" r="3" stroke="white" stroke-width="2"/>
            <path d="M19.4 15a1.65 1.65 0 00.33 1.82l.06.06a2 2 0 010 2.83 2 2 0 01-2.83 0l-.06-.06a1.65 1.65 0 00-1.82-.33 1.65 1.65 0 00-1 1.51V21a2 2 0 01-2 2 2 2 0 01-2-2v-.09A1.65 1.65 0 009 19.4a1.65 1.65 0 00-1.82.33l-.06.06a2 2 0 01-2.83 0 2 2 0 010-2.83l.06-.06A1.65 1.65 0 004.68 15a1.65 1.65 0 00-1.51-1H3a2 2 0 01-2-2 2 2 0 012-2h.09A1.65 1.65 0 004.6 9a1.65 1.65 0 00-.33-1.82l-.06-.06a2 2 0 010-2.83 2 2 0 012.83 0l.06.06A1.65 1.65 0 009 4.68a1.65 1.65 0 001-1.51V3a2 2 0 012-2 2 2 0 012 2v.09a1.65 1.65 0 001 1.51 1.65 1.65 0 001.82-.33l.06-.06a2 2 0 012.83 0 2 2 0 010 2.83l-.06.06A1.65 1.65 0 0019.4 9a1.65 1.65 0 001.51 1H21a2 2 0 012 2 2 2 0 01-2 2h-.09a1.65 1.65 0 00-1.51 1z" stroke="white" stroke-width="2"/>
          </svg>
        </button>

        <button class="ctrl-btn" title="Chat">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none">
            <path d="M21 15a2 2 0 01-2 2H7l-4 4V5a2 2 0 012-2h14a2 2 0 012 2z" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
        </button>

        <button class="ctrl-btn ctrl-with-arrow" title="Levantar mano">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none">
            <path d="M18 11V6a2 2 0 00-2-2 2 2 0 00-2 2" stroke="white" stroke-width="2" stroke-linecap="round"/>
            <path d="M14 10.5V4a2 2 0 00-2-2 2 2 0 00-2 2v1" stroke="white" stroke-width="2" stroke-linecap="round"/>
            <path d="M10 10.5V6a2 2 0 00-2-2 2 2 0 00-2 2v8a6 6 0 006 6h2a6 6 0 006-6v-3a2 2 0 00-2-2h-1" stroke="white" stroke-width="2" stroke-linecap="round"/>
          </svg>
          <svg class="arrow-down" width="8" height="8" viewBox="0 0 8 8" fill="none">
            <path d="M1 2l3 3 3-3" stroke="white" stroke-width="1.5" stroke-linecap="round"/>
          </svg>
        </button>

        <button class="ctrl-btn ctrl-with-arrow ctrl-muted" id="btnMic" title="Activar micrófono">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none">
            <path d="M12 1a3 3 0 00-3 3v8a3 3 0 006 0V4a3 3 0 00-3-3z" stroke="white" stroke-width="2"/>
            <path d="M19 10v2a7 7 0 01-14 0v-2" stroke="white" stroke-width="2" stroke-linecap="round"/>
            <line x1="12" y1="19" x2="12" y2="23" stroke="white" stroke-width="2" stroke-linecap="round"/>
            <line x1="4" y1="4" x2="20" y2="20" stroke="#e74c3c" stroke-width="2.5" stroke-linecap="round"/>
          </svg>
          <svg class="arrow-down" width="8" height="8" viewBox="0 0 8 8" fill="none">
            <path d="M1 2l3 3 3-3" stroke="white" stroke-width="1.5" stroke-linecap="round"/>
          </svg>
        </button>

        <button class="ctrl-btn ctrl-muted" id="btnShare" title="Compartir pantalla">
          <svg width="22" height="20" viewBox="0 0 24 24" fill="none">
            <polyline points="22 12 18 8 14 12" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
            <line x1="18" y1="8" x2="18" y2="16" stroke="white" stroke-width="2" stroke-linecap="round"/>
            <path d="M2 17v-1a4 4 0 014-4h9" stroke="white" stroke-width="2" stroke-linecap="round"/>
            <line x1="4" y1="4" x2="20" y2="20" stroke="#e74c3c" stroke-width="2.5" stroke-linecap="round"/>
          </svg>
        </button>

        <button class="ctrl-btn ctrl-with-arrow" id="btnCam" title="Cámara">
          <svg width="22" height="20" viewBox="0 0 24 24" fill="none">
            <path d="M23 7l-7 5 7 5V7z" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
            <rect x="1" y="5" width="15" height="14" rx="2" stroke="white" stroke-width="2"/>
          </svg>
          <svg class="arrow-down" width="8" height="8" viewBox="0 0 8 8" fill="none">
            <path d="M1 2l3 3 3-3" stroke="white" stroke-width="1.5" stroke-linecap="round"/>
          </svg>
        </button>

        <button class="ctrl-btn" title="Participantes">
          <svg width="22" height="20" viewBox="0 0 24 24" fill="none">
            <path d="M17 21v-2a4 4 0 00-4-4H5a4 4 0 00-4 4v2" stroke="white" stroke-width="2" stroke-linecap="round"/>
            <circle cx="9" cy="7" r="4" stroke="white" stroke-width="2"/>
            <path d="M23 21v-2a4 4 0 00-3-3.87" stroke="white" stroke-width="2" stroke-linecap="round"/>
            <path d="M16 3.13a4 4 0 010 7.75" stroke="white" stroke-width="2" stroke-linecap="round"/>
          </svg>
        </button>

        <button class="ctrl-btn" title="Compartir enlace">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none">
            <path d="M4 12v8a2 2 0 002 2h12a2 2 0 002-2v-8" stroke="white" stroke-width="2" stroke-linecap="round"/>
            <polyline points="16 6 12 2 8 6" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
            <line x1="12" y1="2" x2="12" y2="15" stroke="white" stroke-width="2" stroke-linecap="round"/>
          </svg>
        </button>

        <button class="ctrl-btn" title="Más opciones">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none">
            <rect x="3" y="3" width="7" height="7" rx="1" stroke="white" stroke-width="2"/>
            <rect x="14" y="3" width="7" height="7" rx="1" stroke="white" stroke-width="2"/>
            <rect x="3" y="14" width="7" height="7" rx="1" stroke="white" stroke-width="2"/>
            <rect x="14" y="14" width="7" height="7" rx="1" stroke="white" stroke-width="2"/>
          </svg>
        </button>

        <!-- Botón colgar -->
        <button class="ctrl-btn ctrl-colgar" id="btnColgar" title="Finalizar sesión">
          <svg width="22" height="22" viewBox="0 0 24 24" fill="none">
            <path d="M22 16.92v3a2 2 0 01-2.18 2 19.79 19.79 0 01-8.63-3.07A19.5 19.5 0 013.07 9.8a19.79 19.79 0 01-3.07-8.68A2 2 0 012 .82h3a2 2 0 012 1.72c.127.96.361 1.903.7 2.81a2 2 0 01-.45 2.11L6.09 8.91a16 16 0 006 6l1.27-1.27a2 2 0 012.11-.45c.907.339 1.85.573 2.81.7A2 2 0 0122 16.92z" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
            <line x1="4" y1="4" x2="20" y2="20" stroke="white" stroke-width="2.5" stroke-linecap="round"/>
          </svg>
        </button>

      </div>

    </div>
  </div>

  <!-- MODAL DE CONFIRMACIÓN PARA SALIR -->
  <div class="modal-overlay" id="modalSalir">
    <div class="modal-box">
      <h3 class="modal-title">¿Finalizar sesión?</h3>
      <p class="modal-text">Si sales ahora, la sesión con tu tutor se cerrará.</p>
      <div class="modal-actions">
        <button class="modal-btn modal-cancelar" id="modalCancelar">Seguir en sesión</button>
        <button class="modal-btn modal-confirmar" id="modalConfirmar">Finalizar y salir</button>
      </div>
    </div>
  </div>

  <script src="script.js"></script>
  <script src="sesion.js"></script>
</body>
</html>
